<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FGS Infotama — Download</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             oklch(0.1822 0 0);
      --card:           oklch(0.285 0 0);
      --secondary:      oklch(0.2393 0 0);
      --accent-bg:      oklch(0.371 0 0);
      --border:         oklch(1 0 0 / 10%);

      --fg:             oklch(0.985 0 0);
      --fg-muted:       oklch(0.708 0 0);
      --fg-subtle:      oklch(0.556 0 0);

      --primary:        oklch(0.6267 0.1388 160.4);
      --primary-dim:    oklch(0.6267 0.1388 160.4 / 12%);
      --primary-border: oklch(0.6267 0.1388 160.4 / 28%);

      --radius: 0.625rem;
      --font: 'Open Sans', ui-sans-serif, system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
    }
    .nav-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
    }
    .nav-logo {
      font-weight: 700;
      font-size: 15px;
      color: var(--fg);
      text-decoration: none;
    }
    .nav-logo span { color: var(--primary); }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 72px 24px 48px;
      max-width: 680px;
      margin: 0 auto;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--primary-dim);
      border: 1px solid var(--primary-border);
      border-radius: 99px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--primary);
      margin-bottom: 24px;
    }
    .badge .dot {
      width: 5px; height: 5px;
      background: var(--primary);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .hero h1 {
      font-size: clamp(30px, 5vw, 48px);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--fg);
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .hero p {
      font-size: 16px;
      color: var(--fg-muted);
      margin-bottom: 36px;
      line-height: 1.7;
    }

    /* ── BUTTONS ── */
    .dl-buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--primary);
      color: oklch(0.1 0.03 160);
    }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }

    /* ── MACOS DROPDOWN ── */
    .dropdown {
      position: relative;
      display: inline-flex;
    }
    .btn-ghost {
      background: var(--secondary);
      color: var(--fg);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--accent-bg); }

    .dropdown-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0;
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .dropdown-main {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s;
      border: none;
      background: transparent;
    }
    .dropdown-main:hover { background: var(--accent-bg); }

    .dropdown-arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 100%;
      border-left: 1px solid var(--border);
      cursor: pointer;
      background: transparent;
      border-top: none;
      border-right: none;
      border-bottom: none;
      color: var(--fg-muted);
      transition: background 0.15s, color 0.15s;
      padding: 0;
      font-family: var(--font);
    }
    .dropdown-arrow:hover { background: var(--accent-bg); color: var(--fg); }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      min-width: 180px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      display: none;
      z-index: 50;
    }
    .dropdown-menu.open { display: block; }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--fg-muted);
      text-decoration: none;
      transition: background 0.12s, color 0.12s;
      cursor: pointer;
    }
    .dropdown-item:hover { background: var(--accent-bg); color: var(--fg); }
    .dropdown-item .chip {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      background: var(--secondary);
      color: var(--fg-subtle);
      margin-left: auto;
    }

    .dl-note {
      font-size: 12px;
      color: var(--fg-subtle);
    }

    /* ── 3D SCREENSHOT ── */
    .screenshot-scene {
      perspective: 1200px;
      padding: 0 24px 80px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .screenshot-card {
      transform: rotateX(6deg) rotateY(-2deg) scale(0.97);
      transform-style: preserve-3d;
      transition: transform 0.5s ease, box-shadow 0.5s ease;
      border: 1px solid var(--border);
      box-shadow:
        0 2px 0 0 oklch(1 0 0 / 6%) inset,
        0 40px 80px -20px rgba(0,0,0,0.7),
        0 0 0 1px oklch(0.6267 0.1388 160.4 / 6%);
      background: var(--bg);
      will-change: transform;
    }

    .screenshot-card:hover {
      transform: rotateX(1deg) rotateY(0deg) scale(1);
      box-shadow:
        0 2px 0 0 oklch(1 0 0 / 8%) inset,
        0 60px 120px -20px rgba(0,0,0,0.8),
        0 0 0 1px oklch(0.6267 0.1388 160.4 / 12%);
    }

    .screenshot-card img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 0;
    }
    .footer-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-copy {
      font-size: 12px;
      color: var(--fg-subtle);
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="#" class="nav-logo">FGS <span>Infotama</span></a>
  </div>
</nav>

<section class="hero">
  <div class="badge"><span class="dot"></span> <span id="badge-version">...</span></div>
  <h1>Trade with clarity.<br>Every market move,<br>in one place.</h1>
  <p>A focused desktop experience built for traders who want to stay on top of the market — without the noise.</p>

  <div class="dl-buttons">
    <a href="#" id="btn-win" class="btn btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M0 3.449L9.75 2.1v9.451H0m10.949-9.602L24 0v11.4H10.949M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-12.9-1.801"/></svg>
      Download for Windows
    </a>

    <div class="dropdown" id="mac-dropdown">
      <div class="dropdown-toggle">
        <a href="#" id="btn-mac-arm" class="dropdown-main">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Download for macOS
        </a>
        <button class="dropdown-arrow" id="mac-arrow" aria-label="More macOS options">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>

      <div class="dropdown-menu" id="mac-menu">
        <a href="#" id="dd-mac-arm" class="dropdown-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Apple Silicon
          <span class="chip">M1+</span>
        </a>
        <a href="#" id="dd-mac-intel" class="dropdown-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Intel
          <span class="chip">x86</span>
        </a>
      </div>
    </div>
  </div>

  <div class="dl-note">Windows 10+ &nbsp;·&nbsp; macOS 11+</div>
</section>

<!-- 3D SCREENSHOT -->
<div class="screenshot-scene">
  <div class="screenshot-card" id="card3d">
    <img src="https://sfinxv.is-a.dev/fgsinfotama/Untitled.jpg" alt="FGS Infotama" />
  </div>
</div>

<footer>
  <div class="footer-inner">
    <span class="footer-copy">© 2026 FGS Infotama</span>
  </div>
</footer>

<script>
  // ── Fetch version + links ──
  fetch('https://sfinxv.is-a.dev/fgsinfotama/latest.json')
    .then(r => r.json())
    .then(data => {
      document.getElementById('badge-version').textContent = `v${data.version} — latest`;
      const p = data.platforms;
      if (p?.['windows-x86_64']?.url) {
        document.getElementById('btn-win').href = p['windows-x86_64'].url;
      }
      if (p?.['darwin-aarch64']?.url) {
        const url = p['darwin-aarch64'].url;
        document.getElementById('btn-mac-arm').href = url;
        document.getElementById('dd-mac-arm').href = url;
      }
      if (p?.['darwin-x86_64']?.url) {
        document.getElementById('dd-mac-intel').href = p['darwin-x86_64'].url;
      }
    })
    .catch(() => {
      document.getElementById('badge-version').textContent = 'latest';
    });

  // ── macOS dropdown toggle ──
  const arrow = document.getElementById('mac-arrow');
  const menu  = document.getElementById('mac-menu');

  arrow.addEventListener('click', (e) => {
    e.stopPropagation();
    menu.classList.toggle('open');
  });

  document.addEventListener('click', () => menu.classList.remove('open'));
  menu.addEventListener('click', (e) => e.stopPropagation());

  // ── Subtle 3D tilt on mousemove ──
  const card = document.getElementById('card3d');
  const scene = card.parentElement;

  scene.addEventListener('mousemove', (e) => {
    const rect = scene.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width  - 0.5;
    const y = (e.clientY - rect.top)  / rect.height - 0.5;
    card.style.transform = `rotateX(${-y * 6}deg) rotateY(${x * 6}deg) scale(1)`;
  });

  scene.addEventListener('mouseleave', () => {
    card.style.transform = 'rotateX(6deg) rotateY(-2deg) scale(0.97)';
  });
</script>

</body>
</html>
